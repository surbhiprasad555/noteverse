<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Noteverse — a dreamy, glassmorphism note-taking app to hold your memories and thoughts.">
    <title>Noteverse</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="preload">

    <!-- Splash Cursor Canvas -->
    <canvas id="fluid" class="fixed top-0 left-0 z-50 pointer-events-none w-screen h-screen block"></canvas>

    <!-- ── Top Bar: Typewriter Greeting ────────────────────────── -->
    <div id="top-bar" class="fixed top-8 left-0 w-full z-[150] px-12 text-center pointer-events-none drop-shadow-xl transition-opacity duration-1000">
        <p id="typewriter-text" class="sidebar-text text-3xl md:text-4xl text-white tracking-wide leading-relaxed drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]"></p>
    </div>

    <!-- ── Sidebar Navigation ──────────────────────────────────── -->
    <nav id="main-sidebar" class="fixed top-24 left-8 z-[100] flex flex-col gap-6 transition-opacity duration-500" aria-label="Main navigation">

        <div class="flex items-center gap-4 cursor-pointer group" onclick="openCategory('All notes', this.querySelector('.icon-svg').outerHTML)">
            <div class="w-14 h-14 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:rotate-6 shadow-lg">
                <svg viewBox="0 0 24 24" class="icon-svg w-8 h-8 text-black fill-current"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </div>
            <span class="sidebar-text opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 pointer-events-none">All notes</span>
        </div>

        <div class="flex items-center gap-4 cursor-pointer group" onclick="openCategory('Pinned notes', this.querySelector('.icon-svg').outerHTML)">
            <div class="w-14 h-14 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:-rotate-6 shadow-lg">
                <svg viewBox="0 0 24 24" class="icon-svg w-8 h-8 text-black fill-current"><path d="M16 12V4H17V2H7V4H8V12L6 14V16H11V22H13V16H18V14L16 12Z"/></svg>
            </div>
            <span class="sidebar-text opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 pointer-events-none">Pinned notes</span>
        </div>

        <div class="flex items-center gap-4 cursor-pointer group" onclick="openCategory('To-do list', this.querySelector('.icon-svg').outerHTML)">
            <div class="w-14 h-14 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:rotate-6 shadow-lg">
                <svg viewBox="0 0 24 24" class="icon-svg w-8 h-8 text-black fill-current" style="transform:rotate(135deg)"><path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"/></svg>
            </div>
            <span class="sidebar-text opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 pointer-events-none">To-do list</span>
        </div>

        <div class="flex items-center gap-4 cursor-pointer group" onclick="openCategory('Ideas', this.querySelector('.icon-svg').outerHTML)">
            <div class="w-14 h-14 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:-rotate-6 shadow-lg">
                <svg viewBox="0 0 24 24" class="icon-svg w-8 h-8 text-black fill-current"><path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z"/></svg>
            </div>
            <span class="sidebar-text opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 pointer-events-none">Ideas</span>
        </div>

        <div class="flex items-center gap-4 cursor-pointer group" onclick="openCategory('Archive', this.querySelector('.icon-svg').outerHTML)">
            <div class="w-14 h-14 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:rotate-180 shadow-lg">
                <svg viewBox="0 0 24 24" class="icon-svg w-8 h-8 text-black fill-current"><path d="M6.99 11L3 15L6.99 19V16H14V14H6.99V11ZM21 9L17.01 5V8H10V10H17.01V13L21 9Z"/></svg>
            </div>
            <span class="sidebar-text opacity-0 -translate-x-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 pointer-events-none">Archive</span>
        </div>

    </nav>

    <!-- ── Add Note FAB ─────────────────────────────────────────── -->
    <div id="add-note-btn" class="fixed bottom-12 right-12 z-[100] flex flex-col items-center gap-2 cursor-pointer group transition-opacity duration-500" onclick="openAddNote()">
        <span class="sidebar-text opacity-0 translate-y-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0 pointer-events-none" style="font-size:1.5rem;">Add note</span>
        <div class="w-16 h-16 rounded-full glass-btn flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:rotate-90 shadow-lg">
            <svg viewBox="0 0 24 24" class="w-10 h-10 text-black fill-current"><path d="M19 13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
        </div>
    </div>

    <!-- ── Category View Overlay ────────────────────────────────── -->
    <div id="category-overlay" class="fixed inset-0 z-50 flex flex-col hide-ui overflow-y-auto overflow-x-hidden p-4 sm:p-8" onclick="handleOverlayClick(event)">
        <div class="m-auto w-full flex flex-col items-center py-12 shrink-0">

            <!-- Header (click to close) -->
            <div id="category-header" class="flex flex-col items-center gap-4 cursor-pointer hover:scale-105 transition-transform shrink-0" onclick="closeCategory()">
                <div id="category-icon-wrapper" class="w-24 h-24 rounded-[2rem] glass-btn flex items-center justify-center shadow-xl"></div>
                <span id="category-title" class="sidebar-text" style="font-size:3rem;text-shadow:2px 2px 8px rgba(0,0,0,0.3);">Ideas</span>
            </div>

            <!-- Carousel -->
            <div class="relative w-full max-w-7xl flex items-center justify-between px-2 sm:px-4 mt-12 shrink-0">
                <button class="w-16 h-16 rounded-full glass-btn flex items-center justify-center hover:scale-110 shrink-0 sidebar-text z-20 shadow-xl" style="font-size:2.5rem;" onclick="scrollCarousel(-1)" aria-label="Previous">&#60;</button>
                <div id="category-cards" class="flex-1 flex items-center gap-10 overflow-x-auto py-12 px-8 snap-x snap-mandatory hide-scrollbar scroll-smooth min-w-0 mx-4"></div>
                <button class="w-16 h-16 rounded-full glass-btn flex items-center justify-center hover:scale-110 shrink-0 sidebar-text z-20 shadow-xl" style="font-size:2.5rem;" onclick="scrollCarousel(1)" aria-label="Next">&#62;</button>
            </div>

        </div>
    </div>

    <!-- ── Add Note Overlay ──────────────────────────────────────── -->
    <div id="add-note-overlay" class="fixed inset-0 z-[120] flex items-center justify-center hide-ui transition-opacity duration-500" onclick="handleAddNoteOverlayClick(event)">
        <div class="relative w-full max-w-6xl h-[80vh] flex gap-12 p-8" id="add-note-container">

            <!-- Left: Title & Message -->
            <div class="flex-1 flex flex-col gap-6">
                <div class="flex items-center gap-6">
                    <input type="text" id="note-title" placeholder="Enter Title" class="glass-input flex-1 text-2xl px-8 py-4 rounded-[2rem] outline-none text-white placeholder-white/70 font-sans shadow-lg">
                    <div id="note-datetime" class="sidebar-text text-2xl whitespace-nowrap opacity-90 drop-shadow-md"></div>
                </div>
                <textarea id="note-message" placeholder="Enter message" class="glass-input flex-1 w-full text-xl px-8 py-6 rounded-[2rem] outline-none text-white placeholder-white/70 font-sans resize-none shadow-lg focus:ring-2 focus:ring-purple-500"></textarea>
            </div>

            <!-- Right: Pictures & Save -->
            <div class="w-1/3 flex flex-col items-center gap-8 relative">
                <div id="picture-preview-container" class="relative w-64 h-72 flex items-center justify-center mt-4">
                    <div class="absolute w-56 h-64 rounded-3xl glass-card transform -rotate-12 translate-x-[-30px] opacity-60"></div>
                    <div class="absolute w-56 h-64 rounded-3xl glass-card transform rotate-6 translate-x-[30px] opacity-80"></div>
                    <div class="absolute w-56 h-64 rounded-3xl glass-card z-10 flex items-center justify-center overflow-hidden border border-white/50">
                        <img id="main-preview-img" class="w-full h-full object-cover hidden" src="" alt="Note image preview">
                    </div>
                </div>

                <button class="flex items-center gap-3 sidebar-text text-3xl hover:scale-105 transition-transform drop-shadow-md" onclick="document.getElementById('file-upload').click()">
                    <div class="w-12 h-12 rounded-full glass-btn flex items-center justify-center">
                        <svg viewBox="0 0 24 24" class="w-6 h-6 text-black fill-current"><path d="M4 4H7L9 2H15L17 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4ZM12 17C14.76 17 17 14.76 17 12C17 9.24 14.76 7 12 7C9.24 7 7 9.24 7 12C7 14.76 9.24 17 12 17ZM12 9C13.65 9 15 10.35 15 12C15 13.65 13.65 15 12 15C10.35 15 9 13.65 9 12C9 10.35 10.35 9 12 9Z"/></svg>
                    </div>
                    Upload Pictures
                </button>
                <input type="file" id="file-upload" class="hidden" accept="image/*" multiple onchange="handleFileUpload(event)">

                <button class="w-full mt-auto px-8 py-4 rounded-full glass-btn flex items-center justify-center hover:scale-105 sidebar-text text-3xl shadow-lg transition-transform" onclick="saveNote()">
                    Save Note
                </button>
            </div>

        </div>
    </div>

    <!-- ── Theme Toggle ─────────────────────────────────────────── -->
    <div class="switch-container" aria-label="Toggle day/night theme">
        <label class="switch">
            <input type="checkbox" id="input" checked aria-label="Night mode">
            <div class="slider round">
                <div class="sun-moon">
                    <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                    <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                    <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                </div>
                <div class="stars">
                    <svg id="star-1" class="star-switch" viewBox="0 0 20 20"><path d="M10 0L13 7L20 10L13 13L10 20L7 13L0 10L7 7Z"/></svg>
                    <svg id="star-2" class="star-switch" viewBox="0 0 20 20"><path d="M10 0L13 7L20 10L13 13L10 20L7 13L0 10L7 7Z"/></svg>
                    <svg id="star-3" class="star-switch" viewBox="0 0 20 20"><path d="M10 0L13 7L20 10L13 13L10 20L7 13L0 10L7 7Z"/></svg>
                    <svg id="star-4" class="star-switch" viewBox="0 0 20 20"><path d="M10 0L13 7L20 10L13 13L10 20L7 13L0 10L7 7Z"/></svg>
                </div>
            </div>
        </label>
    </div>

    <!-- ── Background Entities ──────────────────────────────────── -->
    <div id="stars-container" class="absolute inset-0 z-0" aria-hidden="true"></div>
    <div id="birds-container" class="absolute inset-0 z-0" aria-hidden="true"></div>

    <!-- Celestial Body -->
    <div class="celestial-body" aria-hidden="true">
        <svg viewBox="0 0 100 100" class="w-full h-full absolute inset-0">
            <path class="moon-shape" d="M 60 5 A 45 45 0 1 0 95 60 A 35 35 0 1 1 60 5"/>
            <circle class="sun-shape" cx="50" cy="50" r="40"/>
            <path class="sun-shape" d="M50 0 L50 5 M50 95 L50 100 M0 50 L5 50 M95 50 L100 50 M14 14 L18 18 M82 82 L86 86 M14 86 L18 82 M82 14 L86 18" stroke="#FDB813" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- Paper-cut Wave Layers -->
    <div class="layer cloud-top   z-10 paper-shadow-top" aria-hidden="true">
        <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
            <path d="M0,0 L1200,0 L1200,80 Q1100,150 1000,100 Q900,50 800,120 Q700,180 600,110 Q500,40 400,100 Q300,150 200,110 Q100,70 0,120 Z"/>
        </svg>
    </div>
    <div class="layer cloud-top-2 z-10 paper-shadow-top" aria-hidden="true">
        <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
            <path d="M0,0 L1200,0 L1200,50 Q1150,90 1050,60 Q950,20 850,80 Q750,140 650,90 Q550,50 450,110 Q350,160 250,90 Q150,30 0,80 Z"/>
        </svg>
    </div>
    <div class="layer cloud-bottom-1 paper-shadow" aria-hidden="true">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none" style="height:40vh">
            <path d="M0,300 L1200,300 L1200,150 Q1100,50 950,120 Q800,190 650,100 Q500,10 350,110 Q200,210 0,130 Z"/>
        </svg>
    </div>
    <div class="layer cloud-bottom-2 paper-shadow" aria-hidden="true">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none" style="height:35vh">
            <path d="M0,300 L1200,300 L1200,100 Q1050,220 900,150 Q750,80 600,160 Q450,240 300,140 Q150,40 0,150 Z"/>
        </svg>
    </div>
    <div class="layer cloud-bottom-3 paper-shadow" aria-hidden="true">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none" style="height:30vh">
            <path d="M0,300 L1200,300 L1200,180 Q1000,80 850,160 Q700,240 550,150 Q400,60 250,170 Q100,260 0,190 Z"/>
        </svg>
    </div>
    <div class="layer cloud-bottom-4 paper-shadow" aria-hidden="true">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none" style="height:25vh">
            <path d="M0,300 L1200,300 L1200,220 Q1050,150 900,210 Q750,270 600,180 Q450,90 300,200 Q150,300 0,210 Z"/>
        </svg>
    </div>
    <div class="layer forest paper-shadow" aria-hidden="true">
        <svg viewBox="0 0 1200 250" preserveAspectRatio="none" style="height:25vh">
            <path d="M0,250 L1200,250 L1200,200 Q900,170 600,220 Q300,270 0,200 Z"/>
        </svg>
    </div>

    <!-- ── Rotating Quotes ──────────────────────────────────────── -->
    <div id="main-quotes" class="fixed inset-0 z-40 flex flex-col items-center justify-center pointer-events-none p-10 transition-opacity duration-500" aria-live="polite">
        <div class="w-auto max-w-[800px] px-12 py-8 flex flex-col items-center justify-center text-center shadow-[0_12px_40px_rgba(0,0,0,0.4)] transition-all duration-1000"
             style="border-radius:2rem;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">
            <p  id="quote-text"   class="text-4xl lg:text-5xl sidebar-text text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.6)] leading-relaxed transition-opacity duration-1000 opacity-0 max-w-[700px] text-center"></p>
            <p  id="quote-author" class="text-2xl font-sans text-white/80 mt-4 transition-opacity duration-1000 opacity-0 tracking-wide font-medium drop-shadow-md text-center"></p>
        </div>
    </div>

    <!-- ── Scripts ──────────────────────────────────────────────── -->
    <script src="js/app.js"></script>
    <script src="js/splashCursor.js"></script>

</body>
</html>
